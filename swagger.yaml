      summary: List importable Brewfather recipes
      description: >-
        Lists the recipes available in the brewery's connected Brewfather account, so the user can
        pick one to import. Responds 400 when Brewfather is not connected for the brewery.
      tags:
        - Recipes
      responses:
        "200":
          description: Importable Brewfather recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrewfatherRecipe"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: importBrewfatherRecipe
      summary: Import a single Brewfather recipe
      description: >-
        Imports one Brewfather recipe (by its source id) into the brewery's recipe library,
        translating its mash and boil plan. Re-importing an already-imported recipe rebuilds it.
      tags:
        - Recipes
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrewfatherRecipeImport"
        description: Payload
        required: true
      responses:
        "200":
          description: The imported recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        default:
