  /v1/brewery:
    get:
      operationId: getCurrentBrewery
      summary: Get current brewery
      description: Returns the brewery the authenticated user belongs to. Responds 404 when the user has no brewery yet (onboarding required).
      tags:
        - Breweries
      responses:
        "200":
          description: The current brewery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brewery"
        "404":
          description: The user has no brewery yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createBrewery
      summary: Create brewery
      description: Creates a brewery and its Keycloak organization, adding the authenticated user as a member. Used during onboarding.
      tags:
        - Breweries
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Brewery'
        description: Payload
        required: true
      responses:
        "200":
          description: Created brewery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brewery"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updateCurrentBrewery
      summary: Update current brewery
      description: Updates the current brewery (e.g. rename).
      tags:
        - Breweries
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Brewery'
        description: Payload
        required: true
      responses:
        "200":
          description: Updated brewery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brewery"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/brewery/members:
    get:
      operationId: listBreweryMembers
      summary: List brewery members
      description: Lists the members of the current brewery (the users in its Keycloak organization).
      tags:
        - Breweries
      responses:
        "200":
          description: List of brewery members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BreweryMember"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createBreweryMember
      summary: Add a member to the current brewery
      description: >-
        Adds an existing Laitto account to the current brewery by email. The account must already
        exist; it is added to the brewery's Keycloak organization and gains access on next login.
      tags:
        - Breweries
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BreweryMemberInvite"
        description: Payload
        required: true
      responses:
        "200":
          description: The added member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BreweryMember"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/brewery/members/{memberId}:
    delete:
      operationId: deleteBreweryMember
      summary: Remove a member from the current brewery
      description: Removes a member from the current brewery's Keycloak organization.
      tags:
        - Breweries
      parameters:
        - name: memberId
          in: path
          required: true
          description: Keycloak user id of the member to remove
          schema:
            type: string
      responses:
