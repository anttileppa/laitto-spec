  /v1/sessions/{sessionId}/temperatureHistory:
    get:
      operationId: listSessionTemperatureHistory
      summary: List session temperature history
      description: >
        Lists the full persisted thermometer-reading time series for a session, ordered by time.
        Unlike listSessionTemperatures (which returns only the latest reading per thermometer),
        this returns every stored sample so a client can chart actual temperatures over the brew.
      tags:
        - Sessions
      parameters:
        - name: sessionId
          required: true
          in: path
          description: session id
          schema:
            type: string
            format: uuid
        - name: thermometerDeviceId
          required: false
          in: query
          description: filter to a single thermometer device
          schema:
            type: string
            format: uuid
        - name: since
          required: false
          in: query
          description: only return samples at or after this time
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: session temperature history
          content:
            application/json:
              schema:
