          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/sessions/{sessionId}/eventLog:
    get:
      operationId: listSessionEvents
      summary: List session brew events
      description: >
        Lists persisted brew events for a session in chronological order — target-temperature
        changes, scenario activations, manual overrides and recipe-step transitions — recorded
        for later analysis (e.g. charting actual vs. target temperatures). This is the durable
        event log, distinct from the transient streamSessionEvents SSE change-notifications.
      tags:
        - Sessions
      parameters:
        - name: sessionId
          required: true
          in: path
          description: session id
          schema:
            type: string
            format: uuid
        - name: type
          required: false
          in: query
          description: filter to a single event type
          schema:
            $ref: "#/components/schemas/BrewEventType"
        - name: since
          required: false
          in: query
          description: only return events at or after this time
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: session brew events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrewEvent"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/sessions/{sessionId}/events:
    get:
      operationId: streamSessionEvents
      summary: Stream session events (SSE)
      description: >
        Server-Sent Events stream of updates for a session, so the UI can react in real time
        instead of polling. Each event signals that the session changed; the client refetches
        the affected data. The response is a text/event-stream; the generated server stub is
        post-processed (see build.gradle.kts changeApiSpecStreamEndpoints) into a Multi SSE stream.
      tags:
        - SessionEvents
      parameters:
        - name: sessionId
          required: true
          in: path
          description: session id
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: session event stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SessionEvent"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

