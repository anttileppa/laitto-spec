  /v1/deviceData/{deviceId}/logs:
    post:
      operationId: createDeviceLog
      summary: Post log data from device
      description: This method is used to post log data from devices. It's main purpose is to report their current status back to the server.
      tags:
        - DeviceData
      parameters:
        - name: deviceId
          in: path
          required: true
          description: The ID of the device
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceDataLog'
      responses:
        '204':
          description: Successful response
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/deviceData/controllers/{controllerId}/sync:
    post:
      operationId: syncController
      summary: Synchronize a controller
      description: >
        Single round-trip endpoint for a controller (e.g. an ESP32): the controller
        posts its current sensor readings and receives the expected device instructions
        in the response. This minimizes the number of (TLS) requests a controller must
        make per cycle. Authenticated with the controller token issued at registration;
        the token must belong to the controller in the path.
      tags:
        - ControllerSync
      security:
        - controllerAuth: []
      parameters:
        - name: controllerId
          in: path
          required: true
          description: The controller id (e.g. the controller's MAC address)
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ControllerSyncRequest'
      responses:
        '200':
          description: Expected device instructions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControllerSyncResponse'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/deviceData/controllers/{controllerId}/orphan-devices:
    get:
      operationId: listControllerOrphanDevices
      summary: List a controller's orphan devices
      description: >
        Lists devices seen reporting on this controller (via sync) that are not yet bound
        to any device in a device setup. Lets the UI offer discovered devices to pick from
        instead of typing their ids by hand. Backed by an in-memory registry, so the list
        reflects what has reported since the backend last started.
      tags:
        - ControllerSync
      parameters:
        - name: controllerId
          in: path
          required: true
          description: The controller id (e.g. the controller's MAC address)
          schema:
            type: string
      responses:
        '200':
          description: The controller's orphan devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrphanDevice'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/controllers/claims:
    post:
      operationId: createControllerClaim
      summary: Claim a controller
      description: >-
        Starts onboarding a controller into the authenticated user's brewery. The serial comes
        from the controller's QR sticker. Returns a one-time, short-lived claim token that the
        app delivers to the controller over the encrypted BLE provisioning session; the
        controller redeems it via POST /v1/controllers/register. The claim token is only
        returned by this call, never again.
      tags:
        - Controllers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ControllerClaim'
        description: Payload
        required: true
      responses:
        "200":
          description: Created claim, including the one-time claim token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControllerClaim"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/controllers/claims/{claimId}:
    get:
      operationId: findControllerClaim
      summary: Find a controller claim
      description: >-
        Returns the claim's current status. The onboarding wizard polls this after delivering
        the claim token over BLE: CONSUMED means the controller registered successfully.
        The claim token itself is not returned.
      tags:
        - Controllers
      parameters:
        - name: claimId
          required: true
          in: path
          description: claim id
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The claim
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControllerClaim"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/controllers/register:
    post:
      operationId: registerController
      summary: Register a controller
      description: >-
        Called by the controller itself (not a user) after it joins WiFi during onboarding.
        Redeems the one-time claim token for a long-lived controller token, binding the
        controller to the claim's brewery. Unauthenticated by design: the claim token is the
        credential, created by an authenticated user and expiring after a short TTL.
      tags:
        - Controllers
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ControllerRegistrationRequest'
        description: Payload
        required: true
      responses:
        "200":
          description: The issued controller credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControllerRegistration"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/brewery/controllers:
    get:
      operationId: listBreweryControllers
      summary: List the current brewery's controllers
      description: Lists the controllers registered to the current brewery, for management and revocation.
      tags:
        - Controllers
      responses:
        "200":
          description: The brewery's controllers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Controller"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/controllers/{controllerId}:
    delete:
      operationId: deleteController
      summary: Remove a controller
      description: >-
        Removes the controller from the brewery entirely (and its onboarding claims). The
        device keeps its stored token but the backend no longer knows it, so its sync/OTA
        calls fail until it is onboarded again. Use this to decommission a controller; use
        DELETE …/token to only revoke the credential while keeping the controller's record.
      tags:
        - Controllers
      parameters:
        - name: controllerId
          required: true
          in: path
          description: controller id
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Controller removed
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/controllers/{controllerId}/token:
    delete:
      operationId: revokeControllerToken
      summary: Revoke a controller's token
      description: >-
        Revokes the controller's token: its sync and OTA calls start failing with 401 until it
        is re-onboarded. The controller row and its history are kept.
      tags:
        - Controllers
      parameters:
        - name: controllerId
          required: true
          in: path
          description: controller id
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Token revoked
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    controllerAuth:
      type: http
      scheme: bearer
      description: >-
        Opaque per-controller bearer token issued by POST /v1/controllers/register. Not a
        Keycloak JWT; the backend validates it against the controller's stored token hash.

  schemas:

    SessionStatus:
      type: string
      enum:
        - DRAFT
        - BREWING
        - FERMENTING
        - DONE

    Session:
      required:
        - name
        - deviceSetupId
        - status
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        deviceSetupId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/SessionStatus'
        recipeIds:
          type: array
          readOnly: true
          description: Ordered list of recipe IDs linked to this session (brew order).
          items:
            type: string
            format: uuid
        manualMashTemperature:
          type: number
          format: double
          description: >-
            Manually entered mash temperature (°C). When set it overrides the mash thermometer
            reading for control, to cover a missing or broken sensor. Omit to use the sensor.
        manualHotLiquidTemperature:
          type: number
          format: double
          description: >-
            Manually entered hot liquid tank temperature (°C). When set it overrides the HLT
            thermometer reading for control. Omit to use the sensor.
        manualAmbientTemperature:
          type: number
          format: double
          description: >-
            Manually entered ambient temperature (°C). When set it overrides the ambient
            thermometer (used as the grain temperature for strike calculations). Omit to use the
            sensor, which itself falls back to a 20 °C default.
        mashPh:
          type: number
          format: double
          description: Measured mash pH (brew-day reading). Omit when not measured.
        preBoilGravity:
          type: number
          format: double
          description: >-
            Measured pre-boil gravity as specific gravity (e.g. 1.045). With preBoilVolume it
            yields mashEfficiency. Omit when not measured.
        preBoilVolume:
          type: number
          format: double
          description: Measured pre-boil (into-kettle) volume in litres. Omit when not measured.
        originalGravity:
          type: number
          format: double
          description: >-
            Measured original gravity (OG) as specific gravity (e.g. 1.052), the headline
            brew-day number. With volumeIntoFermenter it yields brewhouseEfficiency. Omit when
            not measured.
        postBoilVolume:
          type: number
          format: double
          description: Measured post-boil volume in litres. Omit when not measured.
        volumeIntoFermenter:
          type: number
          format: double
          description: Measured volume transferred into the fermenter, in litres. Omit when not measured.
        mashEfficiency:
          type: number
          format: double
          readOnly: true
          description: >-
            Computed mash efficiency (%), measured into the kettle:
            `GP(preBoilGravity, preBoilVolume) / maxGP × 100`, where
            `GP(g,v) = (g − 1) × 1000 × v` and
            `maxGP = GP(recipe.targetOriginalGravity, recipe.batchSize) / (recipe.targetMashEfficiency / 100)`.
            Omitted when preBoilGravity, preBoilVolume or the recipe targets are missing.
        brewhouseEfficiency:
          type: number
          format: double
          readOnly: true
          description: >-
            Computed brewhouse efficiency (%), measured into the fermenter:
            `GP(originalGravity, volumeIntoFermenter) / maxGP × 100` (same GP/maxGP as
            mashEfficiency). Lower than mashEfficiency by the kettle/trub losses. Omitted when
            originalGravity, volumeIntoFermenter or the recipe targets are missing.
        measuredEvaporationRate:
          type: number
          format: double
          readOnly: true
          description: >-
            Computed boil-off rate in litres per hour: `(preBoilVolume − postBoilVolume) /
            boilTimeHours`, where the boil time comes from the recipe's boil stage. Calibrates the
            device setup's evaporationRate. Omitted when either volume or the boil time is missing.
        measuredKettleLoss:
          type: number
          format: double
          readOnly: true
          description: >-
            Computed wort left behind in the kettle, in litres: `postBoilVolume −
            volumeIntoFermenter`. Calibrates the device setup's kettleLossVolume. Omitted when
            either volume is missing.

    SessionRecipe:
      type: object
      required:
        - recipeId
        - elapsedTime
        - paused
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        recipeId:
          type: string
          format: uuid
        elapsedTime:
          type: integer
          format: int32
          description: |
            The current time in seconds since the session recipe was started. This value progresses when the session recipe is not paused.
        paused:
          type: boolean
          description: |
            Indicates whether the session is paused for given recipe. When true, the elapsedTime does not progress.

    SessionTemperature:
      type: object
      required:
        - thermometerDeviceId
        - time
        - temperature
        - staleness
      properties:
        thermometerDeviceId:
          type: string
          format: uuid
          readOnly: true
        time:
          type: string
          format: date-time
          description: |
            Time the thermometer was last seen (reported a reading), regardless of whether
            the value crossed the persistence threshold. Use `staleness` for the WARN/ERROR state.
          readOnly: true
        temperature:
          description: |
            Last reported temperature in degrees Celsius.
          type: number
          format: double
          readOnly: true
        staleness:
          $ref: '#/components/schemas/ThermometerStaleness'
        changePerMinute:
          type: number
          format: double
          description: |
            Temperature change per minute in degrees Celsius. If measurement is older than 5 minutes, the value is considered stale and will not be reported here.
          readOnly: true
        predictions:
          type: array
          readOnly: true
          description: |
            Zero or more forward-looking temperature predictions for this thermometer, one per
            configured prediction horizon (see the device setup's per-sensor-type prediction
            settings). Each prediction extrapolates a trend fitted over a sampling window of recent
            readings. Informational only — consumers (controller, UI, alerts, automations) decide
            how to use it. Empty or omitted when there is too little reading history to predict.
          items:
            $ref: '#/components/schemas/TemperaturePrediction'

    TemperaturePrediction:
      type: object
      description: |
        A single forward-looking temperature estimate for a thermometer, derived from a trend
        fitted over recent readings. Computed by the backend; consumers do not implement prediction
        logic themselves.
      required:
        - horizonSeconds
        - samplingWindowSeconds
        - predictedTemperature
        - delta
        - changePerMinute
      properties:
        horizonSeconds:
          type: integer
          format: int32
          description: |
            How far ahead this prediction looks, in seconds. The predicted temperature is the
            estimate for `time + horizonSeconds` (where `time` is the latest reading time).
          readOnly: true
        samplingWindowSeconds:
          type: integer
          format: int32
          description: |
            Length of the recent-reading window, in seconds, over which the trend was fitted to
            produce this prediction.
          readOnly: true
        predictedTemperature:
          type: number
          format: double
          description: Predicted temperature in degrees Celsius at the prediction horizon.
          readOnly: true
        delta:
          type: number
          format: double
          description: |
            Predicted change from the current temperature in degrees Celsius
            (`predictedTemperature` − current), signed. Approximately
            `changePerMinute × horizonSeconds / 60`; provided as a convenience.
          readOnly: true
        changePerMinute:
          type: number
          format: double
          description: |
            Trend rate used for this prediction, in degrees Celsius per minute, signed. This is the
            slope fitted over `samplingWindowSeconds`; it may differ from the thermometer's
            top-level `changePerMinute`, which is computed over its own default window.
          readOnly: true

    ThermometerStaleness:
      type: string
      description: |
        Liveness of a thermometer based on when it was last seen. WARNING at >= 5 minutes,
        ERROR at >= 10 minutes. Stale thermometers are NOT failed-safe off — the brew master
        is expected to notice and switch to a manual thermometer / manual control.
      enum:
        - OK
        - WARNING
        - ERROR

    SessionChange:
      type: string
      description: A part of a session that changed, so the client can refetch selectively.
      enum:
        - TEMPERATURES
        - ACTIVE_SCENARIOS
        - RECIPE_STEPS
        - RECIPES

    SessionEvent:
      type: object
      description: A server-sent event listing which parts of a session changed; the UI refetches the affected data.
      required:
        - sessionId
        - changes
      properties:
        sessionId:
          type: string
          format: uuid
          readOnly: true
        changes:
          type: array
          readOnly: true
          description: Which parts of the session changed.
          items:
            $ref: '#/components/schemas/SessionChange'

    SessionTemperatureSample:
      type: object
      description: A single persisted thermometer reading in a session's temperature history.
      required:
        - thermometerDeviceId
        - time
        - temperature
      properties:
        thermometerDeviceId:
          type: string
          format: uuid
          readOnly: true
        time:
          type: string
          format: date-time
          description: Time the reading was recorded.
          readOnly: true
        temperature:
          type: number
          format: double
          description: Reading in degrees Celsius.
          readOnly: true

    BrewEventType:
      type: string
      description: |
        Kind of brew event. The set is expected to grow; clients should tolerate unknown values.
        - SCENARIO_ACTIVATED / SCENARIO_DEACTIVATED: a scenario turned on/off (see scenario* fields).
        - TARGET_TEMPERATURE_CHANGED: a resolved target temperature changed (see targetType + value fields).
        - MANUAL_TEMPERATURE_SET: the brewer set or cleared a manual temperature override.
        - RECIPE_STEP_ADVANCED: the session moved to a new recipe step (see recipeStep fields).
      enum:
        - SCENARIO_ACTIVATED
        - SCENARIO_DEACTIVATED
        - TARGET_TEMPERATURE_CHANGED
        - MANUAL_TEMPERATURE_SET
        - RECIPE_STEP_ADVANCED

    BrewEventTargetType:
      type: string
      description: Which temperature target a TARGET_TEMPERATURE_CHANGED / MANUAL_TEMPERATURE_SET event refers to.
      enum:
        - MASH
        - HOT_LIQUID
        - BOIL
        - AMBIENT

    BrewEvent:
      type: object
      description: |
        A persisted event recorded during a brew, for later analysis. Generic envelope with typed
        fields; which fields are populated depends on `type`. Distinct from the transient SSE SessionEvent.
      required:
        - id
        - sessionId
        - time
        - type
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        sessionId:
          type: string
          format: uuid
          readOnly: true
        time:
          type: string
          format: date-time
          description: When the event occurred.
          readOnly: true
        type:
          $ref: '#/components/schemas/BrewEventType'
        targetType:
          $ref: '#/components/schemas/BrewEventTargetType'
        previousValue:
          type: number
          format: double
          description: Previous numeric value (e.g. previous target/manual temperature in °C), when applicable.
          readOnly: true
        value:
          type: number
          format: double
          description: New numeric value (e.g. new target/manual temperature in °C), when applicable.
          readOnly: true
        previousText:
          type: string
          description: Previous non-numeric value (e.g. previous boil tank status), when applicable.
          readOnly: true
        text:
          type: string
          description: New non-numeric value (e.g. new boil tank status), when applicable.
          readOnly: true
        scenarioId:
          type: string
          format: uuid
          description: Scenario this event concerns, for scenario events.
          readOnly: true
        scenarioType:
          $ref: '#/components/schemas/DeviceSetupScenarioType'
        scenarioMode:
          $ref: '#/components/schemas/SessionActiveScenarioMode'
        recipeStepId:
          type: string
          format: uuid
          description: New recipe step, for RECIPE_STEP_ADVANCED.
          readOnly: true
        previousRecipeStepId:
          type: string
          format: uuid
          description: Previous recipe step, for RECIPE_STEP_ADVANCED.
          readOnly: true

    SessionRecipeStep:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        recipeId:
          description: |
            Recipe id for this step. This value is derived from the recipe and is immutable during the session.
          type: string
          format: uuid
          readOnly: true
        recipeStageType:
          $ref: '#/components/schemas/RecipeStageType'
        time:
          description: |
            Step start time in seconds since session start.

            This value is derived from the recipe and is immutable during the session.
          type: integer
          format: int32
          readOnly: true
        duration:
          description: |
            Step duration in seconds. 

            This value is derived from the recipe and is immutable during the session.
          type: integer
          format: int32
          readOnly: true
        name:
          description: |
            Step name.

            This value is derived from the recipe and is immutable during the session.
          type: string
          readOnly: true
        targetMashTemperature:
          description: |
            Target mash temperature for this step in degrees Celsius. 

            If the step does not have a target temperature, this field will be null. 
            
            This value is derived from the recipe and is immutable during the session.
          type: integer
          format: int32
          readOnly: true
        targetHotLiquidTemperature:
          description: |
            Target hot liquid temperature for this step in degrees Celsius. 

            If the step does not have a target temperature, this field will be null. 
            
            This value is derived from the recipe and is immutable during the session.
          type: integer
          format: int32
          readOnly: true
        startedAt:
          description: |
            The time when the step was started. Setting this value will mark the step as started.
          type: integer
          format: int32
        completedAt:
          description: |
            The time when the step was completed. Setting this value will mark the step as completed.
          type: integer
          format: int32

    SessionActiveScenario:
      required:
        - scenarioId
        - mode
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        scenarioId:
          type: string
          format: uuid
        mode:
          $ref: '#/components/schemas/SessionActiveScenarioMode'

    SessionActiveScenarioMode:
      type: string
      enum:
        - auto
        - manual
        - manualOff

    RecipeStageType:
      type: string
      enum:
        - MASH
        - EVENT
        - BOIL
        - HOPSTAND
        - RAMP

    RecipeStage:
      type: object
      required:
        - type
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        type:
          $ref: '#/components/schemas/RecipeStageType'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/RecipeStageStep'

    RecipeStageStepBoilTankStatus:
      type: string
      description: >-
        What the boil kettle should be doing during a step. Drives the boil-kettle heat/boil
        scenarios.
      enum:
        - NONE
        - HEAT
        - BOIL

    RecipeStageStep:
      type: object
      required:
        - duration
        - time
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        duration:
          type: integer
          format: int32
          description: How long the step lasts, in seconds.
        name:
          type: string
        time:
          type: integer
          format: int32
          description: Seconds remaining until the end of the stage when the step begins (a countdown).
        stepIndex:
          type: integer
          format: int32
          description: Order of the step within its stage.
        targetMashTemperature:
          type: integer
          format: int32
        targetHotLiquidTemperature:
          type: integer
          format: int32
        circulateMashTank:
          type: boolean
          description: Whether the mash tank should circulate during this step. Drives the mash circulation scenario.
        boilTankStatus:
          $ref: '#/components/schemas/RecipeStageStepBoilTankStatus'
        calculateStrikeTemperature:
          type: boolean
          description: >-
            When true, the hot liquid tank target for this step is computed as a strike (pre-heat)
            temperature from the recipe's grain mass, mash water volume and grain temperature and
            this step's targetMashTemperature, instead of using a fixed targetHotLiquidTemperature.
            Falls back to targetHotLiquidTemperature when the inputs are missing.

    Recipe:
      type: object
      required:
        - source
        - sourceId
        - name
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          description: Recipe name
        sourceId:
          type: string
          description: Recipe id in the source system
        source:
          $ref: '#/components/schemas/RecipeSource'
        grainMass:
          type: number
          format: double
          description: Total grain mass in kilograms. Used to compute strike (pre-heat) temperatures.
        mashWaterVolume:
          type: number
          format: double
          description: Mash (strike) water volume in litres. Used to compute strike (pre-heat) temperatures.
        targetOriginalGravity:
          type: number
          format: double
          readOnly: true
          description: >-
            Target original gravity (OG) as specific gravity. Populated from the Brewfather import;
            used as the brew-day OG target and in the efficiency calculation.
        targetFinalGravity:
          type: number
          format: double
          readOnly: true
          description: Target final gravity (FG) as specific gravity. Populated from the Brewfather import.
        targetAbv:
          type: number
          format: double
          readOnly: true
          description: Target alcohol by volume (%). Populated from the Brewfather import.
        targetIbu:
          type: number
          format: double
          readOnly: true
          description: Target bitterness (IBU). Populated from the Brewfather import.
        targetColor:
          type: number
          format: double
          readOnly: true
          description: Target colour (EBC). Populated from the Brewfather import.
        batchSize:
          type: number
          format: double
          readOnly: true
          description: >-
            Target batch (into-fermenter) volume in litres. Populated from the Brewfather import;
            used with targetOriginalGravity and targetMashEfficiency in the efficiency calculation.
        targetMashEfficiency:
          type: number
          format: double
          readOnly: true
          description: >-
            Target mash efficiency (%) the recipe was formulated for (Brewfather's recipe
            efficiency). Populated from the Brewfather import; the baseline the grain bill is sized
            to and the divisor in the efficiency calculation.
        stages:
          type: array
          description: >-
            Brew plan stages. Returned on read, and accepted on update to replace the recipe's
            stages and steps (e.g. editing the mash schedule or boil additions).
          items:
            $ref: '#/components/schemas/RecipeStage'

    BrewfatherRecipe:
      type: object
      required:
        - sourceId
        - name
      description: A recipe available to import from the connected Brewfather account.
      properties:
        sourceId:
          type: string
          description: Recipe id in Brewfather
        name:
          type: string
          description: Recipe name
        imported:
          type: boolean
          description: True when this Brewfather recipe is already imported into the brewery

    BrewfatherRecipeImport:
      type: object
      required:
        - sourceId
      properties:
        sourceId:
          type: string
          description: Brewfather recipe id to import

    Brewery:
      type: object
      required:
        - name
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          description: Brewery name
        brewfatherUserId:
          type: string
          description: >-
            Brewfather API user id (the Basic-auth username). Returned so the UI can show the
            connected account; null when the integration is not configured.
        brewfatherApiKey:
          type: string
          writeOnly: true
          description: >-
            Brewfather API key (the Basic-auth password). Write-only — it is never returned.
            On update: send a non-empty value together with brewfatherUserId to connect, send
            an empty string to disconnect, or omit the field to leave the integration unchanged.
        brewfatherConnected:
          type: boolean
          readOnly: true
          description: True when Brewfather credentials are configured for this brewery.
        openaiApiKey:
          type: string
          writeOnly: true
          description: >-
            OpenAI API key. Write-only — it is never returned.
            On update: send a non-empty value to connect, send an empty string to disconnect,
            or omit the field to leave the integration unchanged.
        openaiConnected:
          type: boolean
          readOnly: true
          description: True when an OpenAI API key is configured for this brewery.

    BreweryMember:
      type: object
      required:
        - id
        - email
      properties:
        id:
          type: string
          description: Keycloak user id of the member
          readOnly: true
        email:
          type: string
          description: Member email address
        firstName:
          type: string
          description: Member first name
        lastName:
          type: string
          description: Member last name
        self:
          type: boolean
          description: True when this member is the requesting user
          readOnly: true

    BreweryMemberInvite:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          description: Email of the existing Laitto account to add to the brewery

    RecipeSource:
      type: string
      enum:
        - BREWFATHER

    ExternalSessionSource:
      type: string
      enum:
        - BREWFATHER

    DeviceSetup:
      type: object
      required:
        - name
        - controllerId
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        controllerId:
          type: string
        type:
          $ref: '#/components/schemas/DeviceSetupType'
          description: |
            Classifies the setup (HERMS, RIMS, fermentation chamber, …). Drives the default
            per-sensor-type prediction settings applied when the setup is created. Optional —
            when omitted the setup behaves as GENERIC_MONITORING for defaulting purposes, so
            existing setups keep working unchanged. May gain further meaning over time (diagram
            presets, scenario sets); for now it only seeds prediction defaults.
        predictionSettings:
          type: array
          description: |
            Per-sensor-type temperature-prediction settings for this setup. Seeded from the
            setup `type` defaults at creation and overridable by advanced users; an entry
            overrides the default for every thermometer of its `sensorType`. Sensors with no
            matching entry use the built-in default for their type. See TemperaturePrediction
            for the resulting read-side data.
          items:
            $ref: '#/components/schemas/DeviceSetupPredictionSetting'
        expectedMashEfficiency:
          type: number
          format: double
          description: >-
            The rig's typical mash efficiency (%). Baseline a session's measured mashEfficiency is
            compared against, and the default when scaling a recipe. Brewer-entered; omit when
            unknown.
        evaporationRate:
          type: number
          format: double
          description: >-
            The rig's typical boil-off at a normal rolling boil, in litres per hour. Baseline a
            session's measuredEvaporationRate is compared against. Brewer-entered; omit when unknown.
        kettleLossVolume:
          type: number
          format: double
          description: >-
            The rig's typical wort left behind in the kettle (trub/dead space), in litres — the
            mash→brewhouse gap as a volume. Baseline a session's measuredKettleLoss is compared
            against. Brewer-entered; omit when unknown.

    DeviceSetupPredictionSetting:
      type: object
      description: |
        Temperature-prediction configuration for one sensor type within a device setup. Tunes how
        forward-looking predictions (TemperaturePrediction) are produced for every thermometer of
        that type.
      required:
        - sensorType
        - samplingWindowSeconds
        - horizonsSeconds
      properties:
        sensorType:
          $ref: '#/components/schemas/DeviceSetupDeviceType'
          description: |
            The thermometer type this setting applies to. Must be one of the `*_THERMOMETER`
            values of DeviceSetupDeviceType; other device types are not predictable.
        samplingWindowSeconds:
          type: integer
          format: int32
          description: |
            Length of the recent-reading window, in seconds, over which the trend is fitted.
          minimum: 1
        horizonsSeconds:
          type: array
          description: |
            One or more prediction horizons, in seconds; each produces one TemperaturePrediction
            entry for a matching thermometer. To keep predictions conservative, a horizon should
            not greatly exceed `samplingWindowSeconds` (validated by the backend), so a short
            sampling window is not extrapolated far into the future.
          minItems: 1
          items:
            type: integer
            format: int32
            minimum: 1
        smoothing:
          $ref: '#/components/schemas/PredictionSmoothing'
          description: |
            Optional pre-filter applied to readings before the trend is fitted. Omit for no
            smoothing (the default; current sensor noise is negligible).

    PredictionSmoothing:
      type: object
      description: |
        Optional smoothing/filtering applied to recent readings before a trend is fitted for
        prediction.
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/PredictionSmoothingType'
        windowSeconds:
          type: integer
          format: int32
          description: |
            Width of the smoothing window in seconds, where applicable to the filter type.
          minimum: 1

    PredictionSmoothingType:
      type: string
      description: |
        Smoothing filter applied before trend fitting. MEDIAN removes impulse spikes / bad reads
        without lagging a ramp. (Only MEDIAN is supported for now; lagging filters such as EMA are
        intentionally excluded as they bias the predicted rate on ramps.)
      enum:
        - MEDIAN

    DeviceSetupDevice:
      type: object
      required:
        - name
        - type
        - controllerIndex
        - properties
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        deviceId:
          type: string
        type:
          $ref: '#/components/schemas/DeviceSetupDeviceType'
        controlMode:
          $ref: '#/components/schemas/ControlMode'
        controllerIndex:
          type: integer
          format: int
        temperatureCorrection:
          type: number
          format: float
        attachedToDeviceId:
          description: >
            Optional id of another device in the same setup this device is attached to (e.g. a
            heater or thermometer attached to a vessel). Used to group accessories next to their
            vessel in the diagram auto-layout.
          type: string
          format: uuid
        properties:
          $ref: '#/components/schemas/DeviceSetupDeviceProperties'

    DeviceSetupDeviceProperties:
      type: object
      required:
        - diagramX
        - diagramY
      properties:
        diagramX:
          type: number
          format: float
        diagramY:
          type: number
          format: float
        locked:
          description: When true the device is pinned in place and is not moved by the diagram auto-layout.
          type: boolean
        inputPositions:
          type: array
          items:
            type: string
        outputPositions:
          type: array
          items:
            type: string

    DeviceSetupPipe:
      type: object
      description: Device setup liquid pipe
      required:
        - inputDeviceId
        - outputDeviceId
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        inputDeviceId:
          type: string
          format: uuid
        outputDeviceId:
          type: string
          format: uuid

    DeviceSetupDeviceType:
      type: string
      enum:
        - VALVE
        - TEE_CONNECTOR
        - WATER_SOURCE
        - HOT_LIQUID_TANK
        - DETERGENT
        - MASH_TANK
        - BOIL_KETTLE
        - PUMP
        - HERMS_COIL
        - COOLER
        - HEATER
        - FERMENTOR
        - DRAIN
        - MASH_TANK_THERMOMETER
        - HOT_LIQUID_TANK_THERMOMETER
        - HERMS_COIL_THERMOMETER
        - BOIL_KETTLE_THERMOMETER
        - FERMENTOR_THERMOMETER
        - AMBIENT_THERMOMETER

    DeviceSetupType:
      type: string
      description: |
        Classifies a device setup by the kind of brewing system it represents. Currently used only
        to seed sensible default prediction settings per sensor type at setup creation; intended to
        carry further meaning over time. GENERIC_MONITORING is the conservative fallback (and the
        implicit type for setups with no explicit `type`).
      enum:
        - HERMS
        - RIMS
        - DIRECT_ELECTRIC
        - FERMENTATION_CHAMBER
        - BOIL_KETTLE
        - GENERIC_MONITORING

    ControlMode:
      type: string
      description: >
        How a controllable output is driven:
        ON_OFF — fully on or off (contactor, relay, solenoid valve);
        TIME_PROPORTIONAL — on/off switched over a window so the time-average matches the duty,
        i.e. "on 50% of the time" (SSR-driven heating element);
        MODULATING — continuously variable output, i.e. "at 50% capacity now" (VFD pump,
        0-10V/4-20mA device, proportional valve, phase-angle dimmer);
        MANUAL — the controller drives nothing; an operator sets the device by hand (manual
        valve), so the device is not bound to a terminal.
        Editable per device; for driven modes the controller clamps the choice to the bound
        terminal's supportedModes. Named by control behaviour, not switching hardware — signalling
        details (PWM, 0-10V, phase-angle) are a terminal concern, not separate modes.
      enum:
        - ON_OFF
        - TIME_PROPORTIONAL
        - MODULATING
        - MANUAL

    DeviceSetupScenario:
      type: object
      required:
        - type
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        type:
          $ref: '#/components/schemas/DeviceSetupScenarioType'

    DeviceSetupScenarioDevice:
      type: object
      required:
        - status
        - deviceId
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        deviceId:
          type: string
          format: uuid
        status:
          type: integer
          minimum: 0
          maximum: 100

    DeviceSetupScenarioType:
      type: string
      enum:
        - FILL_HOT_LIQUID_TANK
        - FILL_BOIL_KETTLE
        - HEAT_HOT_LIQUID_TANK
        - HEAT_BOIL_KETTLE
        - CIRCULATE_HOT_LIQUID_TANK
        - CIRCULATE_BOIL_KETTLE
        - CIRCULATE_MASH_TANK
        - PUMP_BOIL_KETTLE_TO_MASH_TANK
        - PUMP_HOT_LIQUID_TANK_TO_MASH_TANK
        - PUMP_MASH_TANK_TO_BOIL_KETTLE
        - PUMP_BOIL_KETTLE_TO_FERMENTOR
        - COOLING
        - HEAT_MASH_TANK
        - COOL_MASH_TANK
        - COOL_HOT_LIQUID_TANK
        - BOIL

    DeviceDataTemperature:
      type: object
      required:
        - deviceAddress
        - temperature
      properties:
        temperature:
          type: number
          format: double

    DeviceDataStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: integer
          format: int32

    ControllerSyncRequest:
      type: object
      required:
        - readings
      properties:
        readings:
          type: array
          description: Current sensor readings from the controller's devices
          items:
            $ref: '#/components/schemas/ControllerSyncReading'
        firmwareVersion:
          type: string
          description: >
            Firmware version the controller is running. Cheap to send every sync; lets the
            backend detect an OTA/version change and refresh the cached channel inventory.
        channels:
          type: array
          description: >
            The controller's terminal inventory. Normally omitted; sent on the first sync after
            boot or a firmware-version change (it is static between OTA updates), so the hot path
            stays small.
          items:
            $ref: '#/components/schemas/ControllerChannel'

    ControllerSyncReading:
      type: object
      required:
        - deviceId
        - temperature
      properties:
        deviceId:
          type: string
        temperature:
          type: number
          format: double

    ControllerSyncResponse:
      type: object
      required:
        - instructions
      properties:
        instructions:
          type: array
          description: Expected status for each controllable device of the controller
          items:
            $ref: '#/components/schemas/ControllerSyncInstruction'

    ControllerSyncInstruction:
      type: object
      required:
        - deviceId
        - status
      properties:
        deviceId:
          type: string
        status:
          description: Expected device status (0-100; SSR duty percentage or relay on/off)
          type: integer
          format: int32
          minimum: 0
          maximum: 100
        mode:
          $ref: '#/components/schemas/ControlMode'

    OrphanDevice:
      type: object
      description: A device seen reporting on a controller but not yet bound to a device setup.
      required:
        - deviceId
      properties:
        deviceId:
          description: The controller-local device id the controller reported (e.g. ssr, relay-0)
          type: string
        lastTemperature:
          description: The most recent temperature reported for this device, if any
          type: number
          format: double
        lastSeenTime:
          description: When this device was last seen reporting
          type: string
          format: date-time

    DeviceDataLog:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    ControllerClaimStatus:
      type: string
      enum:
        - PENDING
        - CONSUMED
        - EXPIRED

    ControllerClaim:
      type: object
      required:
        - serial
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        serial:
          type: string
          description: Controller serial from the QR sticker (e.g. LC16-2611-0042)
        breweryId:
          type: string
          format: uuid
          readOnly: true
          description: Brewery the claim binds the controller to (the user's current brewery)
        claimToken:
          type: string
          readOnly: true
          description: >-
            One-time claim token the app delivers to the controller over BLE. Only present in
            the create response; subsequent reads omit it.
        expiresAt:
          type: string
          format: date-time
          readOnly: true
          description: When the claim expires if not consumed
        status:
          $ref: '#/components/schemas/ControllerClaimStatus'

    ControllerRegistrationRequest:
      type: object
      required:
        - serial
        - claimToken
      properties:
        serial:
          type: string
          description: The controller's serial
        claimToken:
          type: string
          description: The one-time claim token received over BLE during onboarding
        model:
          type: string
          description: Board model the controller selected from its serial prefix (e.g. lc16-v1)
        firmwareVersion:
          type: string
          description: Firmware version the controller is running
        channels:
          type: array
          description: The controller's terminal inventory, reported once at registration
          items:
            $ref: '#/components/schemas/ControllerChannel'

    ControllerRegistration:
      type: object
      required:
        - controllerId
        - controllerToken
      properties:
        controllerId:
          type: string
          format: uuid
          description: Backend id of the registered controller
        controllerToken:
          type: string
          description: >-
            Long-lived opaque bearer token. The controller stores it in NVS and sends it as
            Authorization Bearer on sync and OTA calls. Only ever returned here; the backend
            stores a hash.

    ControllerStatus:
      type: string
      enum:
        - ACTIVE
        - REVOKED

    ChannelDirection:
      type: string
      enum:
        - OUT
        - IN

    ControllerChannel:
      type: object
      description: >
        One physical terminal the controller reports as part of its channel inventory, so the
        UI can offer only real terminals (filtered by the modes they support) and validate that a
        replacement controller has the terminals a device setup needs.
      required:
        - terminal
        - supportedModes
      properties:
        terminal:
          type: string
          description: Stable terminal id (e.g. relay-12, ssr)
        supportedModes:
          type: array
          description: >
            Driven control modes this terminal can physically do — a subset of ON_OFF,
            TIME_PROPORTIONAL, MODULATING. A device bound to this terminal must pick a controlMode
            from this list. MANUAL is a device-level choice (the device is unbound from any
            terminal) and is never listed here.
          items:
            $ref: '#/components/schemas/ControlMode'
        direction:
          $ref: '#/components/schemas/ChannelDirection'
        rating:
          type: string
          description: Advisory current/voltage rating from the board descriptor (e.g. 16A), if any

    Controller:
      type: object
      required:
        - serial
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        serial:
          type: string
          description: Controller serial (matches the QR sticker)
        name:
          type: string
          description: User-given controller name
        model:
          type: string
          description: Hardware model reported by the controller
        firmwareVersion:
          type: string
          readOnly: true
          description: Firmware version last reported via sync
        lastSeenAt:
          type: string
          format: date-time
          readOnly: true
          description: When the controller last synced
        status:
          $ref: '#/components/schemas/ControllerStatus'
        channels:
          type: array
          readOnly: true
          description: The controller's last reported terminal inventory
          items:
            $ref: '#/components/schemas/ControllerChannel'

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string