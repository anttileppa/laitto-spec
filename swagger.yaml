      summary: Stream session events (SSE)
      description: >
        Server-Sent Events stream of updates for a session, so the UI can react in real time
        instead of polling. Each event signals that the session changed; the client refetches
        the affected data. The response is a text/event-stream; the generated server stub is
        post-processed (see build.gradle.kts changeApiSpecStreamEndpoints) into a Multi SSE stream.
